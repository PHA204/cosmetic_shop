{% extends 'shop/admin/base.html' %}
{% block page_title %}{{ action }} Danh mục{% endblock %}

{% block content %}
<div class="mb-3">
  <a href="{% url 'shop:admin_categories' %}" class="btn btn-outline-secondary btn-sm">← Quay lại</a>
</div>

<div class="card" style="max-width:520px; border-radius:16px; border:none; box-shadow:0 4px 20px rgba(0,0,0,.08);">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-semibold">Tên danh mục <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" required
               value="{{ category.name|default:'' }}" placeholder="VD: Son môi, Kem dưỡng...">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Icon (emoji)</label>
        <input type="text" name="icon" class="form-control" maxlength="10"
               value="{{ category.icon|default:'✨' }}" placeholder="💄">
        <small class="text-muted">Dán emoji vào đây. VD: 💄 🧴 🌸 💅 👁️ ☀️</small>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Mô tả</label>
        <textarea name="description" class="form-control" rows="3"
                  placeholder="Mô tả ngắn về danh mục...">{{ category.description|default:'' }}</textarea>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Thứ tự hiển thị</label>
        <input type="number" name="order" class="form-control" min="0"
               value="{{ category.order|default:0 }}" style="width:120px;">
        <small class="text-muted">Số nhỏ hơn hiện trước</small>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-check-circle"></i> {{ action }} danh mục
        </button>
        <a href="{% url 'shop:admin_categories' %}" class="btn btn-outline-secondary">Hủy</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
