{% extends 'shop/admin/base.html' %}

{% block page_title %}{{ action }} sản phẩm{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{% url 'shop:admin_products' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Quay lại
    </a>
</div>

<div class="card" style="max-width: 700px;">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">Tên sản phẩm <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required
                       value="{{ product.name|default:'' }}">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Giá (VND) <span class="text-danger">*</span></label>
                    <input type="number" name="price" class="form-control" required min="0"
                           value="{{ product.price|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Tồn kho <span class="text-danger">*</span></label>
                    <input type="number" name="stock" class="form-control" required min="0"
                           value="{{ product.stock|default:0 }}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Mô tả</label>
                <textarea name="description" class="form-control" rows="4">{{ product.description|default:'' }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Hình ảnh</label>
                {% if product.image %}
                <div class="mb-2">
                    <img src="{{ product.image.url }}" style="height:100px;object-fit:cover;border-radius:6px;">
                    <small class="text-muted d-block mt-1">Chọn ảnh mới để thay thế</small>
                </div>
                {% endif %}
                <input type="file" name="image" class="form-control" accept="image/*">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> {{ action }} sản phẩm
                </button>
                <a href="{% url 'shop:admin_products' %}" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
